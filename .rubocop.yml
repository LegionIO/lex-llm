plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  Exclude:
    - docs/**/*
    - vendor/**/*
    - gemfiles/**/*
    - lib/generators/**/templates/**/*
  SuggestExtensions: false

Metrics/ClassLength:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/ModuleLength:
  Enabled: false
Performance/CollectionLiteralInLoop:
  Exclude:
    - spec/**/*
Performance/RedundantBlockCall:
  Enabled: false # TODO: temporarily disabled to avoid potential breaking change
Performance/StringInclude:
  Exclude:
    - lib/lex_llm/providers/**/capabilities.rb
Performance/UnfreezeString:
  Exclude:
    - spec/**/*
RSpec/ExampleLength:
  Enabled: false
RSpec/MultipleExpectations:
  Enabled: false
RSpec/LeakyLocalVariable:
  Enabled: false
# Conformance kit specs live under spec/legion/extensions/llm/conformance/
# but the test classes use Canonical::Conformance:: namespace — path can't match.
RSpec/SpecFilePathFormat:
  Exclude:
    - 'spec/legion/extensions/llm/conformance/**/*'
